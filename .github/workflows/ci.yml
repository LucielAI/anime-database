name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: npm ci

      - name: Universe quality gate
        run: bash scripts/enforce-universe-quality.sh

      - name: Validate archive payloads
        run: npm run validate:all

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Bug Catcher PR verification
        if: github.event_name == 'pull_request'
        env:
          BUG_CATCHER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/catch-bugs.js $PR_NUMBER --repo=.
        continue-on-error: true
